# Railway uses the thin Dockerfile that pulls CmdStan from GHCR.
# Prerequisite: GitHub Action "Build CmdStan base image" has published
#   ghcr.io/gustavoravel/mirach-base:cmdstan-2.33.1
# Make that package Public (or add GHCR credentials in Railway).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
